openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Cryptex Exchange API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: user
    description: User data
  - name: exchange
    description: USDT to EUR exchange
  - name: savings
    description: Savings plans
  - name: withdraw
    description: Withdrawals
  - name: admin
    description: Admin control room
  - name: settings
    description: Platform settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── User ──────────────────────────────────────────────────────────────────
  /user/balance:
    get:
      operationId: getUserBalance
      tags: [user]
      summary: Get user balance
      responses:
        "200":
          description: User balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBalance"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/dashboard:
    get:
      operationId: getDashboard
      tags: [user]
      summary: Dashboard summary (balances + recent activity)
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /user/profile:
    patch:
      operationId: updateProfile
      tags: [user]
      summary: Update user profile (email)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/notifications:
    get:
      operationId: getNotifications
      tags: [user]
      summary: Get user notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /user/notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [user]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Settings (public) ─────────────────────────────────────────────────────
  /settings/rate:
    get:
      operationId: getExchangeRate
      tags: [settings]
      summary: Get current USDT/EUR exchange rate
      responses:
        "200":
          description: Current rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateResponse"

  /settings/savings-rates:
    get:
      operationId: getSavingsRates
      tags: [settings]
      summary: Get savings plan daily rates by duration
      responses:
        "200":
          description: Savings rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsRates"

  /settings/platform-stats:
    get:
      operationId: getPlatformStats
      tags: [settings]
      summary: Public platform stats for landing page
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # ── Exchange ───────────────────────────────────────────────────────────────
  /exchange/wallet-address:
    get:
      operationId: getWalletAddress
      tags: [exchange]
      summary: Get company USDT wallet address
      responses:
        "200":
          description: Wallet address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletAddressResponse"

  /exchange/orders:
    get:
      operationId: listExchangeOrders
      tags: [exchange]
      summary: List user exchange orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Exchange orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeOrderList"
    post:
      operationId: createExchangeOrder
      tags: [exchange]
      summary: Create exchange order (sell USDT for EUR)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exchange/orders/{id}:
    get:
      operationId: getExchangeOrder
      tags: [exchange]
      summary: Get exchange order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exchange order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Savings ───────────────────────────────────────────────────────────────
  /savings/plans:
    get:
      operationId: listSavingsPlans
      tags: [savings]
      summary: List user savings plans
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, early_withdrawn]
      responses:
        "200":
          description: Savings plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavingsPlan"
    post:
      operationId: createSavingsPlan
      tags: [savings]
      summary: Create a savings plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavingsPlanInput"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsPlan"
        "400":
          description: Validation or insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /savings/plans/{id}/withdraw-early:
    post:
      operationId: earlyWithdrawSavings
      tags: [savings]
      summary: Early withdraw a savings plan (forfeits profit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Early withdrawal processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsPlan"
        "400":
          description: Cannot withdraw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Withdraw ───────────────────────────────────────────────────────────────
  /withdraw/requests:
    get:
      operationId: listWithdrawals
      tags: [withdraw]
      summary: List user withdrawal requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, rejected]
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdraw]
      summary: Submit withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Insufficient balance or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Transaction History ────────────────────────────────────────────────────
  /user/history:
    get:
      operationId: getTransactionHistory
      tags: [user]
      summary: Combined transaction history
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [exchange, savings, withdrawal, all]
            default: all
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionHistory"

  # ── Admin ──────────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/balance:
    put:
      operationId: adminAdjustBalance
      tags: [admin]
      summary: Manually adjust user balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjustInput"
      responses:
        "200":
          description: Balance adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/exchange/orders:
    get:
      operationId: adminListExchangeOrders
      tags: [admin]
      summary: List all exchange orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Exchange orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminExchangeOrderList"

  /admin/exchange/orders/{id}/confirm:
    put:
      operationId: adminConfirmExchangeOrder
      tags: [admin]
      summary: Confirm exchange order (credit EUR to user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeOrder"

  /admin/exchange/orders/{id}/reject:
    put:
      operationId: adminRejectExchangeOrder
      tags: [admin]
      summary: Reject exchange order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Order rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeOrder"

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawals (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawalList"

  /admin/withdrawals/{id}/process:
    put:
      operationId: adminProcessWithdrawal
      tags: [admin]
      summary: Mark withdrawal as paid or reject it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessWithdrawalInput"
      responses:
        "200":
          description: Withdrawal processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/settings/rate:
    put:
      operationId: adminSetRate
      tags: [admin]
      summary: Set USDT/EUR exchange rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRateInput"
      responses:
        "200":
          description: Rate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateResponse"

  /admin/settings/savings-rates:
    put:
      operationId: adminSetSavingsRates
      tags: [admin]
      summary: Set savings daily profit rates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSavingsRatesInput"
      responses:
        "200":
          description: Savings rates updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsRates"

  /admin/notifications/send:
    post:
      operationId: adminSendNotification
      tags: [admin]
      summary: Send notification to user(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationInput"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/audit-log:
    get:
      operationId: adminGetAuditLog
      tags: [admin]
      summary: Get admin audit log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Auth Schemas ─────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        confirmPassword:
          type: string
      required: [email, password, confirmPassword]

    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        rememberMe:
          type: boolean
      required: [email, password]

    ForgotPasswordInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordInput:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
      required: [token, password]

    ChangePasswordInput:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [currentPassword, newPassword]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        isAdmin:
          type: boolean
        availableEur:
          type: number
        lockedEur:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, email, isAdmin, availableEur, lockedEur, createdAt]

    ProfileUpdate:
      type: object
      properties:
        email:
          type: string
          format: email

    # ── Balance / Dashboard ───────────────────────────────────────────────────
    UserBalance:
      type: object
      properties:
        availableEur:
          type: number
        lockedEur:
          type: number
        totalEur:
          type: number
      required: [availableEur, lockedEur, totalEur]

    DashboardSummary:
      type: object
      properties:
        availableEur:
          type: number
        lockedEur:
          type: number
        totalEur:
          type: number
        pendingExchangeCount:
          type: integer
        activeSavingsCount:
          type: integer
        pendingWithdrawalCount:
          type: integer
        totalProfitEarned:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required: [availableEur, lockedEur, totalEur, pendingExchangeCount, activeSavingsCount, pendingWithdrawalCount, totalProfitEarned, recentActivity]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [exchange, savings, withdrawal]
        description:
          type: string
        amount:
          type: number
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, amount, status, createdAt]

    Notification:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, message, isRead, createdAt]

    # ── Settings Schemas ──────────────────────────────────────────────────────
    ExchangeRateResponse:
      type: object
      properties:
        rate:
          type: number
        updatedAt:
          type: string
          format: date-time
      required: [rate, updatedAt]

    SavingsRates:
      type: object
      properties:
        rate7d:
          type: number
        rate14d:
          type: number
        rate30d:
          type: number
        minAmount:
          type: number
        earlyWithdrawPenalty:
          type: boolean
        penaltyPercent:
          type: number
        updatedAt:
          type: string
          format: date-time
      required: [rate7d, rate14d, rate30d, minAmount, earlyWithdrawPenalty, penaltyPercent, updatedAt]

    PlatformStats:
      type: object
      properties:
        volume24h:
          type: number
        activeUsers:
          type: integer
        avgWithdrawalMinutes:
          type: number
        totalTradesCompleted:
          type: integer
      required: [volume24h, activeUsers, avgWithdrawalMinutes, totalTradesCompleted]

    WalletAddressResponse:
      type: object
      properties:
        address:
          type: string
        network:
          type: string
      required: [address, network]

    # ── Exchange Schemas ──────────────────────────────────────────────────────
    ExchangeOrderInput:
      type: object
      properties:
        usdtAmount:
          type: number
          minimum: 50
          maximum: 50000
        txid:
          type: string
      required: [usdtAmount, txid]

    ExchangeOrder:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        usdtAmount:
          type: number
        eurAmount:
          type: number
        txid:
          type: string
        status:
          type: string
          enum: [pending, completed, rejected]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, userId, usdtAmount, eurAmount, txid, status, createdAt]

    ExchangeOrderList:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeOrder"
        total:
          type: integer
      required: [orders, total]

    # ── Savings Schemas ───────────────────────────────────────────────────────
    SavingsPlanInput:
      type: object
      properties:
        amount:
          type: number
          minimum: 100
        durationDays:
          type: integer
          enum: [7, 14, 30]
      required: [amount, durationDays]

    SavingsPlan:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        durationDays:
          type: integer
        dailyRate:
          type: number
        profitEarned:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        lastPayoutDate:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [active, completed, early_withdrawn]
      required: [id, userId, amount, durationDays, dailyRate, profitEarned, startDate, endDate, status]

    # ── Withdrawal Schemas ────────────────────────────────────────────────────
    WithdrawalInput:
      type: object
      properties:
        amount:
          type: number
          minimum: 10
        method:
          type: string
          enum: [interac, sepa, wise, paypal, bank_wire]
        accountDetails:
          type: object
          additionalProperties: true
      required: [amount, method, accountDetails]

    Withdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, completed, rejected]
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, userId, amount, method, accountDetails, status, createdAt]

    # ── Transaction History ────────────────────────────────────────────────────
    TransactionHistory:
      type: object
      properties:
        exchanges:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeOrder"
        savings:
          type: array
          items:
            $ref: "#/components/schemas/SavingsPlan"
        withdrawals:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"
        total:
          type: integer
      required: [exchanges, savings, withdrawals, total]

    # ── Admin Schemas ─────────────────────────────────────────────────────────
    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        isAdmin:
          type: boolean
        availableEur:
          type: number
        lockedEur:
          type: number
        createdAt:
          type: string
          format: date-time
        exchangeOrderCount:
          type: integer
        savingsPlanCount:
          type: integer
        withdrawalCount:
          type: integer
      required: [id, email, isAdmin, availableEur, lockedEur, createdAt, exchangeOrderCount, savingsPlanCount, withdrawalCount]

    AdminUserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
      required: [users, total]

    AdminUserDetail:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AdminUser"
        recentExchanges:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeOrder"
        recentWithdrawals:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"
        activeSavings:
          type: array
          items:
            $ref: "#/components/schemas/SavingsPlan"
      required: [user, recentExchanges, recentWithdrawals, activeSavings]

    BalanceAdjustInput:
      type: object
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [available, locked]
        reason:
          type: string
      required: [amount, type, reason]

    AdminExchangeOrder:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userEmail:
          type: string
        usdtAmount:
          type: number
        eurAmount:
          type: number
        txid:
          type: string
        status:
          type: string
          enum: [pending, completed, rejected]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, userId, userEmail, usdtAmount, eurAmount, txid, status, createdAt]

    AdminExchangeOrderList:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/AdminExchangeOrder"
        total:
          type: integer
      required: [orders, total]

    RejectInput:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    AdminWithdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userEmail:
          type: string
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, completed, rejected]
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, userId, userEmail, amount, method, accountDetails, status, createdAt]

    AdminWithdrawalList:
      type: object
      properties:
        withdrawals:
          type: array
          items:
            $ref: "#/components/schemas/AdminWithdrawal"
        total:
          type: integer
      required: [withdrawals, total]

    ProcessWithdrawalInput:
      type: object
      properties:
        action:
          type: string
          enum: [complete, reject]
        reason:
          type: string
      required: [action]

    SetRateInput:
      type: object
      properties:
        rate:
          type: number
          minimum: 0.01
      required: [rate]

    SetSavingsRatesInput:
      type: object
      properties:
        rate7d:
          type: number
        rate14d:
          type: number
        rate30d:
          type: number
        minAmount:
          type: number
        earlyWithdrawPenalty:
          type: boolean
        penaltyPercent:
          type: number

    SendNotificationInput:
      type: object
      properties:
        userId:
          type: ["integer", "null"]
        message:
          type: string
        sendToAll:
          type: boolean
      required: [message]

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        adminId:
          type: integer
        adminEmail:
          type: string
        action:
          type: string
        targetUserId:
          type: ["integer", "null"]
        targetUserEmail:
          type: ["string", "null"]
        details:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required: [id, adminId, adminEmail, action, createdAt]

    AuditLogList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
      required: [entries, total]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalAvailableEur:
          type: number
        totalLockedEur:
          type: number
        pendingExchangeOrders:
          type: integer
        pendingWithdrawals:
          type: integer
        activeSavingsPlans:
          type: integer
        totalVolume24h:
          type: number
        completedOrdersToday:
          type: integer
      required: [totalUsers, totalAvailableEur, totalLockedEur, pendingExchangeOrders, pendingWithdrawals, activeSavingsPlans, totalVolume24h, completedOrdersToday]
